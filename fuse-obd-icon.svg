<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="connector" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#ff4400"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="#333" stroke-width="2"/>
  <circle cx="128" cy="128" r="110" fill="none" stroke="#ff6600" stroke-width="0.5" opacity="0.3"/>

  <!-- OBD connector body (trapezoid shape) -->
  <path d="M 88 72 L 168 72 L 178 148 Q 180 158 175 162 Q 168 168 128 170 Q 88 168 81 162 Q 76 158 78 148 Z"
        fill="url(#connector)" stroke="#444" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Connector top ridge -->
  <path d="M 90 72 L 166 72" stroke="#666" stroke-width="2" stroke-linecap="round"/>

  <!-- Pin holes (top row) -->
  <circle cx="104" cy="90" r="5" fill="#111" stroke="#555" stroke-width="0.5"/>
  <circle cx="128" cy="90" r="5" fill="#111" stroke="#555" stroke-width="0.5"/>
  <circle cx="152" cy="90" r="5" fill="#111" stroke="#555" stroke-width="0.5"/>

  <!-- Pin holes (mid row) -->
  <circle cx="110" cy="110" r="5" fill="#111" stroke="#555" stroke-width="0.5"/>
  <circle cx="128" cy="110" r="5" fill="#111" stroke="#555" stroke-width="0.5"/>
  <circle cx="146" cy="110" r="5" fill="#111" stroke="#555" stroke-width="0.5"/>

  <!-- Pin holes (bottom row) -->
  <circle cx="116" cy="130" r="5" fill="#111" stroke="#555" stroke-width="0.5"/>
  <circle cx="140" cy="130" r="5" fill="#111" stroke="#555" stroke-width="0.5"/>

  <!-- Active glowing pin (data) -->
  <circle cx="128" cy="110" r="4" fill="#ff6600" filter="url(#glow)" opacity="0.9"/>

  <!-- Side LEDs -->
  <circle cx="82" cy="104" r="3" fill="#00ff44" filter="url(#glow)"/>
  <circle cx="82" cy="118" r="3" fill="#00ccff" filter="url(#glow)"/>

  <!-- FUSE text below connector -->
  <text x="128" y="198" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="28" font-weight="900" fill="url(#accent)" filter="url(#glow)"
        letter-spacing="6">FUSE</text>

  <!-- OBD text -->
  <text x="128" y="224" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="14" font-weight="600" fill="#888" letter-spacing="4">OBD</text>

  <!-- Circuit trace lines (decorative) -->
  <line x1="60" y1="70" x2="85" y2="80" stroke="#ff6600" stroke-width="0.8" opacity="0.4"/>
  <line x1="55" y1="100" x2="85" y2="100" stroke="#ff6600" stroke-width="0.8" opacity="0.3"/>
  <line x1="60" y1="130" x2="85" y2="120" stroke="#ff6600" stroke-width="0.8" opacity="0.4"/>
  <line x1="196" y1="80" x2="171" y2="80" stroke="#ff6600" stroke-width="0.8" opacity="0.4"/>
  <line x1="200" y1="100" x2="171" y2="100" stroke="#ff6600" stroke-width="0.8" opacity="0.3"/>
  <line x1="196" y1="120" x2="171" y2="120" stroke="#ff6600" stroke-width="0.8" opacity="0.4"/>

  <!-- Subtle ring accent -->
  <path d="M 50 170 Q 128 210 206 170" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.2"/>
</svg>
