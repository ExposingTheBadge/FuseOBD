name: Release (signed)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version part to bump (ignored when dry_run=true)"
        required: true
        default: "minor"
        type: choice
        options:
          - major
          - minor
          - patch
          - build
      dry_run:
        description: "Sign-only test: build + sign current version, no bump/commit/tag/release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write  # required for OIDC federated login to Azure

jobs:
  build-sign-release:
    runs-on: windows-latest

    env:
      AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
      AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
      AZURE_ARTIFACT_SIGNING_CERT_PROFILE: ${{ vars.AZURE_ARTIFACT_SIGNING_CERT_PROFILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Zig 0.16.0
        shell: pwsh
        run: |
          $ver = "0.16.0"
          $url = "https://ziglang.org/download/$ver/zig-x86_64-windows-$ver.zip"
          $zip = "$env:RUNNER_TEMP/zig.zip"
          $dest = "$env:RUNNER_TEMP/zig"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          $zigDir = (Get-ChildItem -Directory $dest | Select-Object -First 1).FullName
          "$zigDir" | Out-File -FilePath $env:GITHUB_PATH -Append
          & "$zigDir/zig.exe" version

      - name: Build Zig native J2534 layer
        shell: pwsh
        run: |
          Push-Location zig
          zig build -Dtarget=x86_64-windows --release=safe
          Pop-Location
          if (-not (Test-Path "zig/zig-out/bin/fuse_j2534.dll")) {
            Write-Error "Zig build did not produce fuse_j2534.dll"
            exit 1
          }
          Get-Item zig/zig-out/bin/fuse_j2534.dll | Format-Table Name, Length

      - name: Bump version
        id: bump
        shell: pwsh
        run: |
          $bump = "${{ github.event.inputs.bump }}"
          $dryRun = "${{ github.event.inputs.dry_run }}" -eq "true"
          $content = Get-Content version.py -Raw
          $major = [int]([regex]::Match($content, 'MAJOR\s*=\s*(\d+)').Groups[1].Value)
          $minor = [int]([regex]::Match($content, 'MINOR\s*=\s*(\d+)').Groups[1].Value)
          $patch = [int]([regex]::Match($content, 'PATCH\s*=\s*(\d+)').Groups[1].Value)
          $build = [int]([regex]::Match($content, 'BUILD\s*=\s*(\d+)').Groups[1].Value)

          if (-not $dryRun) {
            switch ($bump) {
              "major" { $major++; $minor = 0; $patch = 0; $build = 0 }
              "minor" { $minor++; $patch = 0; $build = 0 }
              "patch" { $patch++; $build = 0 }
              "build" { $build++ }
            }
          } else {
            Write-Host "DRY RUN: keeping current version $major.$minor.$patch.$build (no bump, no commit, no release)"
          }

          $ver = "$major.$minor.$patch.$build"
          $verShort = "$major.$minor.$patch"

          $appName = [regex]::Match($content, 'APP_NAME\s*=\s*"([^"]+)"').Groups[1].Value
          $appDesc = [regex]::Match($content, 'APP_DESC\s*=\s*"([^"]+)"').Groups[1].Value

          if (-not $dryRun) {
            @"
            MAJOR = $major
            MINOR = $minor
            PATCH = $patch
            BUILD = $build

            VERSION = "$ver"
            VERSION_SHORT = "$verShort"

            APP_NAME = "$appName"
            APP_DESC = "$appDesc"
            "@ | Set-Content version.py -Encoding UTF8
          }

          @"
          # UTF-8
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=($major, $minor, $patch, $build),
              prodvers=($major, $minor, $patch, $build),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
            ),
            kids=[
              StringFileInfo(
                [
                StringTable(
                  u'040904B0',
                  [StringStruct(u'CompanyName', u'FuseOBD'),
                  StringStruct(u'FileDescription', u'$appName - $appDesc'),
                  StringStruct(u'FileVersion', u'$ver'),
                  StringStruct(u'InternalName', u'FuseOBD'),
                  StringStruct(u'LegalCopyright', u'Copyright (C) 2026 FuseOBD - GPL-3.0-or-later'),
                  StringStruct(u'OriginalFilename', u'FuseOBD.exe'),
                  StringStruct(u'ProductName', u'$appName'),
                  StringStruct(u'ProductVersion', u'$ver')])
                ]),
              VarFileInfo([VarStruct(u'Translation', [1033, 1200])])
            ]
          )
          "@ | Set-Content version_info.txt -Encoding UTF8

          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconfirm fuse.spec
          New-Item -ItemType Directory -Force -Path "dist/signing" | Out-Null
          Move-Item "dist/FuseOBD.exe" "dist/signing/FuseOBD-v${{ steps.bump.outputs.version }}.exe"

      - name: Azure login (OIDC federated)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign with Azure Artifact Signing
        uses: azure/trusted-signing-action@v0.5.1
        with:
          endpoint: ${{ env.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_ARTIFACT_SIGNING_CERT_PROFILE }}
          files-folder: dist/signing
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload signed artifact (dry-run)
        if: github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: FuseOBD-signed-dryrun-v${{ steps.bump.outputs.version }}
          path: dist/signing/FuseOBD-v${{ steps.bump.outputs.version }}.exe
          if-no-files-found: error
          retention-days: 14

      - name: Commit version bump
        if: github.event.inputs.dry_run != 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.py version_info.txt
          git commit -m "v${{ steps.bump.outputs.version }} - signed release"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Build release notes
        if: github.event.inputs.dry_run != 'true'
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ steps.bump.outputs.tag }}"
          $prevTag = git describe --tags --abbrev=0 "$tag^" 2>$null
          if (-not $prevTag) { $prevTag = "" }

          # PowerShell captures multi-line command output as a string array
          # and joins it with " " when interpolated into a string. Pipe to
          # Out-String to keep newlines so the markdown bullets render.
          if ($prevTag) {
            $commits = (git log "$prevTag..HEAD" --pretty=format:"- %s" --no-merges | Out-String).TrimEnd()
          } else {
            $commits = (git log HEAD --pretty=format:"- %s" --no-merges | Out-String).TrimEnd()
          }

          if (-not $commits) { $commits = "- Internal updates and improvements" }

          $body = @"
          ## Changes

          $commits

          ### Install
          Download ``FuseOBD-${tag}.exe`` below and run it. Binaries are Authenticode-signed; Windows will show **Verified publisher: FuseOBD**.

          "@

          if ($prevTag) {
            $body += "`n**Full Changelog:** https://github.com/${{ github.repository }}/compare/$prevTag...$tag"
          }

          $delim = "EOF_NOTES_$([guid]::NewGuid().ToString('N'))"
          "body<<$delim" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $delim | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        if: github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: FuseOBD ${{ steps.bump.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          files: dist/signing/FuseOBD-v${{ steps.bump.outputs.version }}.exe
